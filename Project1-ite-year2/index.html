    <!DOCTYPE html>
    <html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Demo</title>
    <link rel="stylesheet" href="style.css">
    </head>

<body>

    <div class="cover">
        <img src="./image.png" alt="RUPP">
        <h1>ENCRYPTION & DECRYPTION DEMO</h1>
        <p><b>Submitted to:</b> Mr. LIM Seyha</p>
        <p>Royal University of Phnom Penh</p>
        <p>February, 27, 2026</p>
        <br>
        <p><b>By:</b> Sami Bunleap<br>
    </div>
    <div class="container">
        
    <!-- Caesar Cipher -->
    <div class="card">
    <h2>Caesar Cipher (k = 3)</h2>
    <input type="text" id="caesarInput" placeholder="Enter text">
    <button onclick="caesarEncrypt()">Encrypt</button>
    <button onclick="caesarDecrypt()">Decrypt</button>
    <div class="result" id="caesarResult"></div>
    </div>

    <!-- General Shift -->
    <div class="card">
    <h2>General Shift Cipher</h2>
    <input type="text" id="shiftInput" placeholder="Enter text">
    <input type="number" id="shiftKey" placeholder="Enter key">
    <button onclick="shiftEncrypt()">Encrypt</button>
    <button onclick="shiftDecrypt()">Decrypt</button>
    <div class="result" id="shiftResult"></div>
    </div>

    <!-- Affine Cipher -->
    <div class="card">
    <h2>Affine Cipher</h2>
    <input type="text" id="affineInput" placeholder="Enter text">
    <input type="number" id="keyA" placeholder="Key a">
    <input type="number" id="keyB" placeholder="Key b">
    <button onclick="affineEncrypt()">Encrypt</button>
    <button onclick="affineDecrypt()">Decrypt</button>
    <div class="result" id="affineResult"></div>
    </div>

    <!-- RSA -->
    <div class="card">
    <h2>RSA (Simple Demo)</h2>
    <input type="number" id="p" placeholder="Prime p">
    <input type="number" id="q" placeholder="Prime q">
    <button onclick="generateRSA()">Generate Keys</button>
    <div id="rsaKeys"></div>

    <input type="number" id="rsaMessage" placeholder="Enter number message">
    <button onclick="rsaEncrypt()">Encrypt</button>
    <button onclick="rsaDecrypt()">Decrypt</button>
    <div class="result" id="rsaResult"></div>
    </div>
    </div>
    <div class="footer">
    Encryption and Decryption Project | Royal University of Phnom Penh
    </div>
    </body>
    <script src="index.js"></script>
    </html>
